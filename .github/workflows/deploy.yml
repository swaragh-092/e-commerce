name: CD — Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time — never cancel mid-flight
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          # Fail the GitHub step if anything inside the script fails
          script_stop: true

          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            cd "$APP_DIR"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Deploy started at $(date)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ── Error trap: print the failing command on exit ───────────
            trap 'echo ""; echo "❌ DEPLOY FAILED on: $BASH_COMMAND"; echo "   Run: pm2 logs ecommerce-api --lines 50"' ERR

            # ──────────────────────────────────────────────────────────
            # STEP 1 — Pull latest code
            # ──────────────────────────────────────────────────────────
            echo ""
            echo "── [1/5] git pull"
            git pull origin main \
              || { echo "❌ git pull failed — resolve merge conflicts first"; exit 1; }

            # ──────────────────────────────────────────────────────────
            # STEP 2 — Backend dependencies
            # npm ci is faster + deterministic (uses package-lock.json)
            # ──────────────────────────────────────────────────────────
            echo ""
            echo "── [2/5] Backend: npm ci"
            cd server
            npm ci --omit=dev \
              || { echo "❌ npm ci failed — check package-lock.json is committed"; exit 1; }

            # ──────────────────────────────────────────────────────────
            # STEP 3 — Swap guard (t3.micro = 1 GB RAM only)
            # Must exist before the Vite build or it will OOM
            # ──────────────────────────────────────────────────────────
            echo ""
            echo "── [3/5] Swap check (t3.micro safety net)"
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile \
                && sudo chmod 600 /swapfile \
                && sudo mkswap /swapfile \
                && sudo swapon /swapfile \
                && echo "   ✅ 2 GB swap created" \
                || echo "   ⚠️  Swap creation failed — build may OOM"
            else
              echo "   ℹ️  Swap already active — skipping"
            fi

            # ──────────────────────────────────────────────────────────
            # STEP 4 — Frontend build
            # CRITICAL ORDER: build BEFORE reloading pm2.
            # If build fails here, backend keeps serving old (working) code.
            # ──────────────────────────────────────────────────────────
            echo ""
            echo "── [4/5] Frontend build (512 MB heap)"
            cd ../client
            npm ci \
              || { echo "❌ client npm ci failed"; exit 1; }

            NODE_OPTIONS=--max-old-space-size=512 npm run build \
              || { echo "❌ Vite build failed — backend NOT reloaded, old site still live"; exit 1; }

            # ──────────────────────────────────────────────────────────
            # STEP 5 — Reload backend (only runs if all above passed)
            # Use full path so pm2 finds index.js from any working dir
            # ──────────────────────────────────────────────────────────
            echo ""
            echo "── [5/5] Reload backend via pm2"
            cd "$APP_DIR/server"
            pm2 reload ecommerce-api \
              || pm2 start "$APP_DIR/server/index.js" --name ecommerce-api \
              || { echo "❌ pm2 failed to start/reload"; exit 1; }

            # Optional: run DB migrations if sequelize-cli is installed
            npx sequelize-cli db:migrate --env production 2>/dev/null \
              && echo "   ✅ Migrations applied" \
              || echo "   ℹ️  No migrations to run"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Deploy complete at $(date)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Smoke test — runs from the GitHub Actions runner ──────────
      # Retries 5 times with 5-second gaps (pm2 may need a moment)
      # Hits port 5000 directly — no Nginx assumption
      - name: Smoke test — health check
        run: |
          echo "Waiting for pm2 to stabilise..."
          sleep 10

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              "http://${{ secrets.EC2_HOST }}:5000/api/health" || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is healthy"
              exit 0
            fi
            sleep 5
          done

          echo "❌ Health check failed after 5 attempts"
          echo "   SSH into EC2 and run: pm2 logs ecommerce-api --lines 50"
          exit 1