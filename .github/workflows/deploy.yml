name: CD — Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time — never cancel mid-flight
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest   # 7 GB RAM — Vite builds here, not on EC2

    steps:
      # ──────────────────────────────────────────────────────────
      # STEP 1 — Checkout code on the GitHub Actions runner
      # ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────
      # STEP 2 — Build frontend on the runner (7 GB RAM, no OOM)
      # EC2 t3.micro never touches this build
      # ──────────────────────────────────────────────────────────
      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: /api

      # ──────────────────────────────────────────────────────────
      # STEP 3 — Copy built dist/ to EC2 via SCP
      # ──────────────────────────────────────────────────────────
      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          source:   "client/dist/*"
          target:   "${{ secrets.APP_DIR }}/client/dist"
          strip_components: 2   # removes "client/dist" prefix from path

      # ──────────────────────────────────────────────────────────
      # STEP 4 — SSH into EC2: pull code, install, migrate, reload
      # No frontend build here — dist was already uploaded above
      # ──────────────────────────────────────────────────────────
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          script_stop: true

          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            cd "$APP_DIR"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Deploy started at $(date)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            trap 'echo "❌ DEPLOY FAILED on: $BASH_COMMAND"; echo "Run: pm2 logs ecommerce-api --lines 50"' ERR

            # ── [1/3] Pull latest code ─────────────────────────────────
            echo ""
            echo "── [1/3] git pull"
            git pull origin main \
              || { echo "❌ git pull failed"; exit 1; }

            # ── [2/3] Backend dependencies ─────────────────────────────
            # NOTE: server/.env already exists on EC2 — never touch it
            echo ""
            echo "── [2/3] Backend: npm ci"
            cd server
            npm ci --omit=dev \
              || { echo "❌ npm ci failed — check package-lock.json is committed"; exit 1; }

            # ── [3/3] Reload backend + migrate ─────────────────────────
            echo ""
            echo "── [3/3] Reload backend via pm2"
            pm2 reload ecommerce-api \
              || pm2 start "$APP_DIR/server/index.js" --name ecommerce-api \
              || { echo "❌ pm2 failed"; exit 1; }

            # Run DB migrations
            NODE_ENV=production npm run migrate \
              && echo "   ✅ Migrations applied" \
              || echo "   ℹ️  No new migrations to run"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Deploy complete at $(date)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ──────────────────────────────────────────────────────────
      # STEP 5 — Smoke test (retries 5x with 5s gap)
      # ──────────────────────────────────────────────────────────
      - name: Smoke test — health check
        run: |
          echo "Waiting for pm2 to stabilise..."
          sleep 10

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              "http://${{ secrets.EC2_HOST }}:5000/health" || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is healthy"
              exit 0
            fi
            sleep 5
          done

          echo "❌ Health check failed after 5 attempts"
          echo "   SSH into EC2 and run: pm2 logs ecommerce-api --lines 50"
          exit 1