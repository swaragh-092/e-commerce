name: CD — Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time — never cancel mid-flight
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest   # 7 GB RAM — Vite builds here, not on EC2

    steps:
      # ──────────────────────────────────────────────────────────
      # STEP 1 — Checkout code on the GitHub Actions runner
      # ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────
      # STEP 2 — Build frontend on the runner (7 GB RAM, no OOM)
      # EC2 t3.micro never touches this build
      # ──────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: /api

      # ──────────────────────────────────────────────────────────
      # STEP 3 — Deploy backend + frontend to EC2 via SSH
      # ──────────────────────────────────────────────────────────
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          script_stop: true

          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            cd "$APP_DIR"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Deploy started at $(date)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            trap 'echo "❌ DEPLOY FAILED on: $BASH_COMMAND"; echo "Run: pm2 logs ecommerce-api --lines 50"' ERR

            # ── [1/4] Pull latest code ─────────────────────────────────
            echo ""
            echo "── [1/4] git pull"
            git pull origin main \
              || { echo "❌ git pull failed"; exit 1; }

            # ── [2/4] Backend dependencies ─────────────────────────────
            echo ""
            echo "── [2/4] Backend: npm ci"
            cd server
            npm ci --omit=dev \
              || { echo "❌ npm ci failed — check package-lock.json is committed"; exit 1; }
            cd "$APP_DIR"

            # ── [3/4] pm2 reload backend ───────────────────────────────
            echo ""
            echo "── [3/4] Reload backend via pm2"
            pm2 reload ecommerce-api \
              || pm2 start "$APP_DIR/server/index.js" --name ecommerce-api \
              || { echo "❌ pm2 failed"; exit 1; }

            # Run DB migrations
            cd "$APP_DIR/server"
            NODE_ENV=production npm run migrate \
              && echo "   ✅ Migrations applied" \
              || echo "   ℹ️  No new migrations to run"
            cd "$APP_DIR"

            # ── [4/4] Frontend: prepare directory for new dist ─────────
            echo ""
            echo "── [4/4] Deploy frontend dist to nginx"
            # Nginx owns dist/ — can't overwrite owned files. Use atomic swap.
            mv "$APP_DIR/client/dist" "$APP_DIR/client/dist_old" 2>/dev/null || true
            mkdir -p "$APP_DIR/client/dist"
            echo "   ✅ Dist directory purged & recreated"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Backend deployed, dist directory ready"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ──────────────────────────────────────────────────────────
      # STEP 4 — Copy dist files to EC2 via SSH tar (no SCP, no Docker)
      # ──────────────────────────────────────────────────────────
      - name: Upload dist/ to EC2 via SSH tar
        run: |
          # Write SSH key to a temp file
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # SSH args with key
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22"

          # Tar the built dist, pipe over SSH, extract on EC2
          cd client/dist
          tar czf - . | $SSH ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd ${{ secrets.APP_DIR }}/client/dist && tar xzf -"

          echo "✅ Frontend dist uploaded to EC2"

      # ──────────────────────────────────────────────────────────
      # STEP 5 — Smoke test (retries 5x with 5s gap)
      # ──────────────────────────────────────────────────────────
      - name: Smoke test — health check
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22"

          echo "Waiting for pm2 to stabilise..."
          sleep 10

          for i in 1 2 3 4 5; do
            STATUS=$($SSH ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:5000/health" \
              || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is healthy"
              exit 0
            fi
            sleep 5
          done

          echo "❌ Health check failed after 5 attempts"
          echo "   SSH into EC2 and run: pm2 logs ecommerce-api --lines 50"
          exit 1